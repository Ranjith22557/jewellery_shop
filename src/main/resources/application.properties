spring.application.name=jewellery

# Most free hosting platforms (Render, Railway, etc.) assign a dynamic port
# via the PORT environment variable and require the app to bind to it.
# Falls back to 8080 for local development where PORT isn't set.
server.port=${PORT:8080}

spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

#DataBase
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect