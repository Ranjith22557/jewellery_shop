<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Monthly Sales Report - Murugan Jewellery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/sales.css}" />
    <link rel="icon" type="image/png" th:href="@{/images/icons/sales-history.png}" />
</head>
<body>
<div class="header">
    <span class="fw-bold fs-4">Murugan Jewellery</span>
    <div class="right d-flex align-items-center">
        <span th:text="'Welcome, ' + ${username}">Welcome, User</span>
        <a th:href="@{/logout}" class="btn btn-sm btn-light ms-3">Logout</a>
    </div>
</div>

<div class="d-flex">
    <div class="sidebar" style="width: 200px;">
        <a th:href="@{/home}" class="d-block mb-2">Home</a>
        <a th:href="@{/purchase}" class="d-block mb-2">Purchase</a>
        <a th:href="@{/sales}" class="d-block mb-2">Sales</a>
        <a th:href="@{/stock}" class="d-block mb-2">Stock</a>
        <a th:href="@{/payment}" class="d-block mb-2">Payment</a>
        <a th:href="@{/salesHistory}" class="d-block mb-2">Sales History</a>
        <a th:href="@{/purchaseHistory}" class="d-block mb-2">Purchase History</a>
        <a th:href="@{/monthlySales}" class="d-block mb-2">Monthly Sales</a>
    </div>

    <div class="main-content p-4 flex-grow-1">
        <h2>Monthly Sales Report</h2>

        <table class="table table-bordered table-hover mt-4">
            <thead class="table-light">
            <tr>
                <th>Month</th>
                <th>Year</th>
                <th>Total Sales Amount (₹)</th>
            </tr>
            </thead>
            <tbody id="monthlySalesBody">

            </tbody>
        </table>
    </div>
</div>

<script src="/js/monthlySales.js"></script> <!-- link to your JS -->
</body>
</html>
