<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales - Murugan Jewellery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" th:href="@{/css/sales.css}">
    <link rel="icon" type="image/png" th:href="@{/images/icons/sales.png}"/>
</head>
<body>
<div class="header">
    <span>Murugan Jewellery</span>
    <div class="right d-flex align-items-center">
        <span th:text="'Welcome, ' + ${username}">Welcome, User</span>
        <a th:href="@{/logout}" class="btn btn-sm btn-light ms-3">Logout</a>
    </div>
</div>

<div class="d-flex">
    <div class="sidebar" style="width: 200px;">
        <a th:href="@{/home}" class="d-block mb-2">Home</a>
        <a th:href="@{/purchase}" class="d-block mb-2">Purchase</a>
        <a th:href="@{/sales}" class="d-block mb-2">Sales</a>
        <a th:href="@{/stock}" class="d-block mb-2">Stock</a>
        <a th:href="@{/payment}" class="d-block mb-2">Payment</a>
        <a th:href="@{/salesHistory}" class="d-block mb-2">Sales History</a>
        <a th:href="@{/purchaseHistory}" class="d-block mb-2">Purchase History</a>
        <a th:href="@{/monthlySales}" class="d-block mb-2">Monthly Sales</a>
    </div>

    <div class="main-content p-4 flex-grow-1">
        <h2>Sales Entry</h2>
        <form th:object="${sale}" id="salesForm">
            <!-- Row 1 -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="customerName" class="form-label">Customer Name:</label>
                    <input type="text" th:field="*{customerName}" class="form-control" id="customerName" required>
                </div>
                <div class="col-md-4">
                    <label for="phoneNo" class="form-label">Phone No:</label>
                    <input type="tel" th:field="*{phoneNo}" class="form-control" id="phoneNo" pattern="[0-9]{10}" required>
                </div>
                <div class="col-md-4">
                    <label for="husbandName" class="form-label">Husband Name:</label>
                    <input type="text" th:field="*{husbandName}" class="form-control" id="husbandName">
                </div>
            </div>

            <!-- Row 2 -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="date" class="form-label">Date:</label>
                    <input type="date" th:field="*{date}" class="form-control" id="date" required>
                </div>
                <div class="col-md-4">
                    <label for="email" class="form-label">Email Id:</label>
                    <input type="email" th:field="*{email}" class="form-control" id="email">
                </div>
                <div class="col-md-4">
                    <label for="itemType" class="form-label">Item Type:</label>
                    <select th:field="*{itemType}" class="form-select" id="itemType">
                        <option value="">--Select Ring--</option>
                        <option value="ring">Ring</option>
                        <option value="chain">Chain</option>
                        <option value="coin">Coin</option>
                    </select>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="gram" class="form-label">Gram:</label>
                    <select th:field="*{gram}" class="form-select" id="gram">
                        <option value="">--Select Gram--</option>
                        <option value="1gram">1 Gram</option>
                        <option value="2gram">2 Grams</option>
                        <option value="4gram">4 Grams</option>
                        <option value="8gram">8 Grams</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="actualPrice" class="form-label">Actual Price (per gram):</label>
                    <input type="number" th:field="*{actualPrice}" class="form-control" id="actualPrice" readonly>
                </div>
                <div class="col-md-4">
                    <label for="remainingQty" class="form-label">Remaining Qty:</label>
                    <input type="number" th:field="*{remainingQty}" class="form-control" id="remainingQty" readonly>
                </div>
            </div>

            <!-- Row 4 -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="quantity" class="form-label">Quantity:</label>
                    <input type="number" th:field="*{quantity}" class="form-control" id="quantity" min="1" required>
                </div>
                <div class="col-md-4">
                    <label for="rate" class="form-label">Rate:</label>
                    <input type="number" th:field="*{rate}" class="form-control" id="rate" required>
                </div>
                <div class="col-md-4">
                    <label for="total" class="form-label">Total Amount:</label>
                    <input type="number" th:field="*{total}" class="form-control" id="total" readonly>
                </div>
                <div class="col-md-4">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" th:field="*{exchange}" id="exchange">
                        <label class="form-check-label" for="exchange">Exchange</label>
                    </div>
                </div>
            </div>

            <!-- Row 5 -->
            <div class="row mb-3" id="exchangeFields" style="display: none;">
                <div class="col-md-4">
                    <label for="oldGram" class="form-label">Old Gram:</label>
                    <input type="text" th:field="*{oldGram}" class="form-control" id="oldGram">
                </div>
                <div class="col-md-4">
                    <label for="oldPrice" class="form-label">Old Gold Price:</label>
                    <input type="number" th:field="*{oldPrice}" class="form-control" id="oldPrice">
                </div>
            </div>

            <!-- Row 6 -->
            <div class="row mb-3">

                <div class="col-md-4">
                    <label for="discount" class="form-label">Discount:</label>
                    <input type="number" th:field="*{discount}" class="form-control" id="discount" >
                </div>
                <div class="col-md-4">
                    <label for="netTotalAmount" class="form-label">Net Total Amount:</label>
                    <input type="number" th:field="*{netTotalAmount}" class="form-control" id="netTotalAmount" readonly>
                </div>
                <div class="col-md-4">
                    <label for="paidAmount" class="form-label">Paid Amount:</label>
                    <input type="number" th:field="*{paidAmount}" class="form-control" id="paidAmount">
                </div>
                <div class="col-md-4">
                    <label for="pendingAmount" class="form-label">Pending Amount:</label>
                    <input type="number" th:field="*{pendingAmount}" class="form-control" id="pendingAmount" readonly>
                </div>
            </div>

            <button type="submit" class="btn btn-success">Submit Sale</button>
        </form>
        <div id="successMessage" class="d-none text-success"></div>
    </div>
</div>
<script th:src="@{/js/sales.js}"></script>
</body>
</html>
