<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock - Murugan Jewellery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" th:href="@{/css/sales.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/theme.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/responsive.css}">
</head>
<body>
<div class="header">
    <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">&#9776;</button>
    <span class="fw-bold fs-4">Murugan Jewellery</span>
    <div class="right d-flex align-items-center">
        <span th:text="'Welcome, ' + ${username}">Welcome, User</span>
        <a th:href="@{/logout}" class="btn btn-sm btn-light ms-3">Logout</a>
    </div>
</div>
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<div class="d-flex">
    <div class="sidebar" style="width: 200px;">
        <a th:href="@{/home}" class="d-block mb-2">Home</a>
        <a th:href="@{/purchase}" class="d-block mb-2">Purchase</a>
        <a th:href="@{/sales}" class="d-block mb-2">Sales</a>
        <a th:href="@{/stock}" class="d-block mb-2">Stock</a>
        <a th:href="@{/payment}" class="d-block mb-2">Payment</a>
        <a th:href="@{/salesHistory}" class="d-block mb-2">Sales History</a>
        <a th:href="@{/purchaseHistory}" class="d-block mb-2">Purchase History</a>
    </div>

    <div class="main-content p-4 flex-grow-1">
        <h2>Stock</h2>

        <!-- List of customer sales records -->
        <div class="table-responsive">
        <table class="table table-bordered table-hover mt-4">
            <thead class="table-light">
            <tr>
                <th>Type</th>
                <th>Gram</th>
                <th>Quantity</th>
                <th>Remaining Qty</th>
                <th>Date</th>
                <th>Total Amount</th>
            </tr>
            </thead>
            <tbody id="stockTableBody">

            </tbody>
        </table>
        </div>
    </div>
</div>
<script th:src="@{/js/stock-history.js}"></script>
<script th:src="@{/js/responsive.js}"></script>
</body>
</html>
